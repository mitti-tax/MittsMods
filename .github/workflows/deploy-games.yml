name: Deploy Games Frontend

on:
  push:
    branches: [main]
    paths:
      - "games/frontend/**"
      - ".github/workflows/deploy-games.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: games/frontend
        run: npm install

      - name: Build
        working-directory: games/frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: games/frontend/dist
          destination_dir: games
          keep_files: true
