name: Deploy MittsMods Site

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "about.html"
      - "projects.html"
      - "style.css"
      - ".github/workflows/deploy-site.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy static site to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: ".github,games,README.md,MittsMods.sln"
          keep_files: true
