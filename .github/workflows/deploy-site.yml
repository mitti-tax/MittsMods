name: Deploy MittsMods Site

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "about.html"
      - "projects.html"
      - "style.css"
      - "posts/**"
      - "images/**"
      - ".github/workflows/deploy-site.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          mkdir -p /tmp/site
          cp index.html about.html projects.html style.css /tmp/site/
          [ -d posts ] && cp -r posts /tmp/site/
          [ -d images ] && cp -r images /tmp/site/

      - name: Deploy static site to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/site
          keep_files: true
